name: Build & Release (Windows)

# Build the portable exe on Windows. On a v* tag, also publish a GitHub Release
# with the portable zip attached. Manual runs (workflow_dispatch) just upload the
# zip as a build artifact for testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable exe + zip
        shell: pwsh
        run: .\build.ps1

      - name: Show build output
        shell: pwsh
        run: Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenStep-win64
          path: dist/TokenStep-*-win64.zip
          if-no-files-found: error

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $zipItem = Get-ChildItem dist/TokenStep-*-win64.zip | Select-Object -First 1
          $zip = $zipItem.FullName
          # Publish the SHA-256 so the in-app auto-updater can verify the download.
          # Plain labeled line (no code fence) — keeps the digest glued to nothing
          # so the updater's `\b<64-hex>\b` parser finds it next to the asset name.
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $notes = "## TokenStep for Windows $tag`n`nSHA-256: $sha  $($zipItem.Name)`n"
          $notesFile = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $notesFile -Value $notes -Encoding utf8
          # Recreate fresh so notes always include both the SHA-256 and the
          # auto-generated changelog (gh release edit can't --generate-notes).
          # Deleting the release keeps the git tag (no --cleanup-tag).
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes
          }
          gh release create $tag "$zip" --title "TokenStep for Windows $tag" --notes-file "$notesFile" --generate-notes
